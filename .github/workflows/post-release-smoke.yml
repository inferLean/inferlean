name: post-release-smoke

'on':
  workflow_run:
    workflows:
      - release
    types:
      - completed

permissions:
  contents: read

jobs:
  resolve-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          release_tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -z "${release_tag}" ]; then
            echo "Could not resolve a semantic version tag for ${{ github.event.workflow_run.head_sha }}" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

  smoke-unix:
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: macos-latest
            os: darwin
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_tag }}

      - name: Install from published release
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          bash ./scripts/install.sh \
            --version "${RELEASE_TAG}" \
            --install-dir "${RUNNER_TEMP}/inferlean-bin"

      - name: Verify installed binary
        shell: bash
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/inferlean-bin/inferlean" version
          "${RUNNER_TEMP}/inferlean-bin/inferlean" discover --help
          "${RUNNER_TEMP}/inferlean-bin/inferlean" collect --help

      - name: Verify Linux tool bundle
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          tools_root="${RUNNER_TEMP}/inferlean-bin/tools/linux_${{ matrix.arch }}"
          test -d "${tools_root}/prometheus"
          test -d "${tools_root}/node_exporter"
          test -d "${tools_root}/dcgm"
          test -f "${tools_root}/TOOLS.txt"
          test -n "$(find "${tools_root}/prometheus" -type f -name prometheus | head -n1)"
          test -n "$(find "${tools_root}/node_exporter" -type f -name node_exporter | head -n1)"

          grep -q '^dcgm_exporter_version=' "${tools_root}/TOOLS.txt"
          grep -q '^dcgm_exporter_repo=' "${tools_root}/TOOLS.txt"
          grep -q '^dcgm_exporter_go_min_version=' "${tools_root}/TOOLS.txt"
          grep -q '^dcgm_exporter_install_strategy=' "${tools_root}/TOOLS.txt"
          dcgm_runnable="$(grep '^dcgm_exporter_runnable=' "${tools_root}/TOOLS.txt" | cut -d= -f2 || true)"
          dcgm_strategy="$(grep '^dcgm_exporter_install_strategy=' "${tools_root}/TOOLS.txt" | cut -d= -f2 || true)"
          if [ "${dcgm_runnable}" = "true" ]; then
            test -n "$(find "${tools_root}/dcgm" -type f \( -name dcgm-exporter -o -name dcgm_exporter \) -perm -111 | head -n1)"
          fi
          case "${dcgm_strategy}" in
            build_on_install|bundled_binary) ;;
            *)
              echo "unexpected dcgm_exporter_install_strategy: ${dcgm_strategy}" >&2
              exit 1
              ;;
          esac

          dcgm_bin="$(find "${RUNNER_TEMP}/inferlean-bin/tools/linux_${{ matrix.arch }}" -type f \( -name dcgm-exporter -o -name dcgm_exporter \) -perm -111 | head -n1 || true)"
          if [ -n "${dcgm_bin}" ]; then
            echo "Detected runnable dcgm-exporter: ${dcgm_bin}"
          else
            echo "No runnable dcgm-exporter binary was bundled; install.sh will build it on supported Linux NVIDIA hosts."
          fi

  smoke-windows:
    needs: resolve-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_tag }}

      - name: Install from published release
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\install.ps1 -Version $env:RELEASE_TAG -InstallDir "$env:RUNNER_TEMP\inferlean-bin"

      - name: Verify installed binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:RUNNER_TEMP\inferlean-bin\inferlean.exe" version
          & "$env:RUNNER_TEMP\inferlean-bin\inferlean.exe" discover --help
          & "$env:RUNNER_TEMP\inferlean-bin\inferlean.exe" collect --help
